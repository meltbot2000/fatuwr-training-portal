<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FATUWR — More</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --color-bg-base: #111111;
    --color-bg-card: #1E1E1E;
    --color-bg-modal: #2A2A2A;
    --color-primary: #2196F3;
    --color-primary-light: #93C5FD;
    --color-text-primary: #FFFFFF;
    --color-text-secondary: #888888;
    --color-divider: #2C2C2C;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 9999px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #222;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; }
  /* thin scrollbar inside phone */
  .phone-scroll::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* =========================================================
   TWEAKABLE DEFAULTS (persisted)
   ========================================================= */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "compact",
  "showEyebrow": true,
  "showShareCard": false,
  "accent": "#2196F3"
}/*EDITMODE-END*/;

/* =========================================================
   CONTENT MODEL
   Each item: { key, label, title, subtitle, art }
   `art` is a procedural SVG scene — a placeholder that feels
   like a real photo/graphic region until real imagery is
   supplied. (Per design guidance: placeholders > bad SVG.)
   ========================================================= */
const ITEMS = [
  {
    key: 'membership',
    label: 'MEMBERSHIP',
    title: 'Membership',
    subtitle: 'Fees, trials & renewals',
    art: 'pool-deck',
    cta: 'Manage'
  },
  {
    key: 'policies',
    label: 'CLUB POLICIES',
    title: 'Club Policies',
    subtitle: 'Training rules & guidelines',
    art: 'policies',
    cta: 'Read'
  },
  {
    key: 'invite',
    label: 'GET INVOLVED',
    title: 'Invite a Friend',
    subtitle: 'Bring someone new to try UWR',
    art: 'invite',
    cta: 'Share'
  },
  {
    key: 'merch',
    label: 'SHOP',
    title: 'Merchandise',
    subtitle: 'FATUWR gear & apparel',
    art: 'merch',
    cta: 'Browse'
  },
  {
    key: 'new',
    label: 'GETTING STARTED',
    title: 'New to the Club',
    subtitle: "Beginner's guide to FATUWR",
    art: 'beginner',
    cta: 'Learn more'
  },
  {
    key: 'resources',
    label: 'REFERENCE',
    title: 'Resources & Links',
    subtitle: 'Useful documents & websites',
    art: 'resources',
    cta: 'Open'
  },
  {
    key: 'videos',
    label: 'WATCH',
    title: 'Videos',
    subtitle: 'Highlights & tutorials',
    art: 'videos',
    cta: 'Play'
  },
];

/* =========================================================
   ART — Generative placeholder scenes (SVG)
   Built from simple primitives. Each one evokes the section
   without pretending to be real photography.
   ========================================================= */
function Art({ kind, accent = '#2196F3' }) {
  const common = {
    width: '100%', height: '100%',
    preserveAspectRatio: 'xMidYMid slice',
    style: { display: 'block' }
  };
  switch (kind) {
    case 'pool-deck':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="sky1" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stopColor="#1a2733"/>
              <stop offset="1" stopColor="#0e1a24"/>
            </linearGradient>
            <linearGradient id="water1" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stopColor="#1e5f8c"/>
              <stop offset="1" stopColor="#0b3450"/>
            </linearGradient>
          </defs>
          <rect width="400" height="110" fill="url(#sky1)"/>
          <rect y="110" width="400" height="90" fill="url(#water1)"/>
          {/* stand */}
          <rect x="0" y="96" width="400" height="18" fill="#2a3a48"/>
          <rect x="0" y="96" width="400" height="2" fill="#3a4e60" opacity=".6"/>
          {/* lane ropes */}
          {[0,1,2,3,4].map(i => (
            <g key={i}>
              <line x1="0" y1={128 + i*14} x2="400" y2={128 + i*14} stroke="#6da9c9" strokeWidth=".8" opacity=".4"/>
              {Array.from({length: 22}).map((_, j) => (
                <circle key={j} cx={10 + j*18} cy={128 + i*14} r="2" fill="#d9e8ef" opacity=".55"/>
              ))}
            </g>
          ))}
          {/* palms silhouette */}
          <path d="M20 96 Q30 50 50 60 Q40 70 52 72 Q30 78 40 96 Z" fill="#0c1b18" opacity=".9"/>
          <path d="M330 96 Q345 40 370 55 Q355 65 375 70 Q345 76 355 96 Z" fill="#0c1b18" opacity=".9"/>
          {/* moon/glow */}
          <circle cx="300" cy="35" r="18" fill="#ffcb8a" opacity=".35"/>
          <circle cx="300" cy="35" r="10" fill="#ffdfb0" opacity=".6"/>
        </svg>
      );
    case 'policies':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="pg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stopColor="#263847"/>
              <stop offset="1" stopColor="#12202c"/>
            </linearGradient>
          </defs>
          <rect width="400" height="200" fill="url(#pg)"/>
          {/* shield-ish monolith */}
          <g transform="translate(200,100)">
            <path d="M0 -70 L60 -50 L55 30 Q45 60 0 75 Q-45 60 -55 30 L-60 -50 Z"
                  fill="#1a2836" stroke={accent} strokeWidth="2" opacity=".95"/>
            <path d="M-22 -5 L-4 14 L24 -18" fill="none" stroke={accent} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
          </g>
          {/* horizontal rules */}
          {[0,1,2].map(i => (
            <rect key={i} x="40" y={30 + i*14} width={120 - i*18} height="3" rx="1.5" fill="#ffffff" opacity={.2 - i*.05}/>
          ))}
          {[0,1,2].map(i => (
            <rect key={i} x={250 + i*6} y={150 + i*8} width={100 - i*10} height="3" rx="1.5" fill="#ffffff" opacity={.18 - i*.04}/>
          ))}
        </svg>
      );
    case 'invite':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="ig" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stopColor="#0d3a54"/>
              <stop offset="1" stopColor="#082633"/>
            </linearGradient>
          </defs>
          <rect width="400" height="200" fill="url(#ig)"/>
          {/* ripple circles */}
          {[0,1,2,3].map(i => (
            <circle key={i} cx="120" cy="100" r={30 + i*28} fill="none" stroke={accent} strokeWidth="1.2" opacity={.5 - i*.1}/>
          ))}
          {/* three figures silhouettes */}
          <g fill="#0a1a24" opacity=".95">
            <g transform="translate(250,110)">
              <circle cx="0" cy="-20" r="14"/>
              <path d="M-22 30 Q0 -4 22 30 Z"/>
            </g>
            <g transform="translate(295,125)">
              <circle cx="0" cy="-16" r="11"/>
              <path d="M-18 24 Q0 -2 18 24 Z"/>
            </g>
            <g transform="translate(335,118)">
              <circle cx="0" cy="-18" r="12"/>
              <path d="M-19 26 Q0 -3 19 26 Z"/>
            </g>
          </g>
          {/* plus */}
          <g transform="translate(120,100)" stroke={accent} strokeWidth="3" strokeLinecap="round">
            <line x1="-10" y1="0" x2="10" y2="0"/>
            <line x1="0" y1="-10" x2="0" y2="10"/>
          </g>
        </svg>
      );
    case 'merch':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="mg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stopColor="#2b2e3a"/>
              <stop offset="1" stopColor="#15171e"/>
            </linearGradient>
          </defs>
          <rect width="400" height="200" fill="url(#mg)"/>
          {/* folded tshirt */}
          <g transform="translate(70,40)">
            <path d="M0 20 L30 0 L50 10 L70 0 L100 20 L90 50 L80 45 L80 120 L20 120 L20 45 L10 50 Z"
                  fill="#1a3b55" stroke={accent} strokeWidth="1.5"/>
            <text x="50" y="85" textAnchor="middle" fontFamily="Inter" fontWeight="700" fontSize="14" fill={accent}>FATUWR</text>
          </g>
          {/* cap */}
          <g transform="translate(230,70)">
            <path d="M0 40 Q60 0 120 40 L120 55 L0 55 Z" fill="#1a3b55" stroke={accent} strokeWidth="1.5"/>
            <path d="M0 55 Q60 68 120 55 L120 62 Q60 75 0 62 Z" fill="#123044" stroke={accent} strokeWidth="1.2"/>
            <circle cx="60" cy="28" r="4" fill={accent}/>
          </g>
          {/* price-tag-esque sparkle */}
          <g transform="translate(350,40)" fill={accent} opacity=".8">
            <path d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z"/>
          </g>
        </svg>
      );
    case 'beginner':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stopColor="#1d5070"/>
              <stop offset="1" stopColor="#082233"/>
            </linearGradient>
          </defs>
          <rect width="400" height="200" fill="url(#bg2)"/>
          {/* wavy underwater */}
          {[0,1,2,3,4,5].map(i => (
            <path key={i}
                  d={`M0 ${40 + i*28} Q 100 ${30 + i*28} 200 ${42 + i*28} T 400 ${40 + i*28}`}
                  fill="none" stroke="#9cd4ee" strokeWidth="1.2" opacity={.45 - i*.05}/>
          ))}
          {/* bubbles */}
          {[{x:80,y:150,r:5},{x:110,y:130,r:3},{x:95,y:105,r:2},{x:320,y:160,r:6},{x:345,y:140,r:3},{x:330,y:118,r:2}].map((b,i) =>
            <circle key={i} cx={b.x} cy={b.y} r={b.r} fill="none" stroke="#cfeaf5" strokeWidth="1" opacity=".7"/>
          )}
          {/* "1" in a circle */}
          <g transform="translate(200,100)">
            <circle r="36" fill="#0a2a3d" stroke={accent} strokeWidth="2"/>
            <text y="10" textAnchor="middle" fontFamily="Inter" fontWeight="600" fontSize="38" fill="#fff">1</text>
          </g>
        </svg>
      );
    case 'resources':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="rg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stopColor="#1e2a36"/>
              <stop offset="1" stopColor="#0f161e"/>
            </linearGradient>
          </defs>
          <rect width="400" height="200" fill="url(#rg)"/>
          {/* stacked cards/docs */}
          {[0,1,2].map(i => (
            <g key={i} transform={`translate(${120 + i*14}, ${50 + i*14}) rotate(${-6 + i*6})`}>
              <rect width="160" height="100" rx="6" fill="#1f3445" stroke={accent} strokeWidth="1.2" opacity={.8 + i*.05}/>
              <rect x="14" y="18" width="100" height="6" rx="2" fill="#ffffff" opacity=".7"/>
              <rect x="14" y="34" width="120" height="3" rx="1.5" fill="#ffffff" opacity=".25"/>
              <rect x="14" y="44" width="110" height="3" rx="1.5" fill="#ffffff" opacity=".25"/>
              <rect x="14" y="54" width="80" height="3" rx="1.5" fill="#ffffff" opacity=".25"/>
              <circle cx="24" cy="80" r="4" fill={accent}/>
              <rect x="34" y="77" width="60" height="6" rx="2" fill={accent} opacity=".6"/>
            </g>
          ))}
        </svg>
      );
    case 'videos':
      return (
        <svg viewBox="0 0 400 200" {...common}>
          <defs>
            <linearGradient id="vg" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stopColor="#081827"/>
              <stop offset="1" stopColor="#03080e"/>
            </linearGradient>
            <radialGradient id="vspot" cx=".5" cy=".5" r=".6">
              <stop offset="0" stopColor={accent} stopOpacity=".35"/>
              <stop offset="1" stopColor={accent} stopOpacity="0"/>
            </radialGradient>
          </defs>
          <rect width="400" height="200" fill="url(#vg)"/>
          <rect width="400" height="200" fill="url(#vspot)"/>
          {/* film-strip holes */}
          {Array.from({length: 10}).map((_,i) => (
            <rect key={'t'+i} x={10 + i*40} y="10" width="20" height="10" rx="2" fill="#000" stroke="#1f2f3d" strokeWidth=".5"/>
          ))}
          {Array.from({length: 10}).map((_,i) => (
            <rect key={'b'+i} x={10 + i*40} y="180" width="20" height="10" rx="2" fill="#000" stroke="#1f2f3d" strokeWidth=".5"/>
          ))}
          {/* play triangle */}
          <g transform="translate(200,100)">
            <circle r="34" fill="#ffffff" opacity=".06"/>
            <circle r="30" fill="none" stroke={accent} strokeWidth="2"/>
            <path d="M-10 -14 L18 0 L-10 14 Z" fill="#fff"/>
          </g>
        </svg>
      );
    default:
      return <svg viewBox="0 0 400 200" {...common}><rect width="400" height="200" fill="#1E1E1E"/></svg>;
  }
}

/* =========================================================
   ICONS
   ========================================================= */
const CalendarPlus = ({ c = 'currentColor' }) => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="5" width="18" height="16" rx="2.5" stroke={c} strokeWidth="1.8"/>
    <path d="M3 9h18M8 3v4M16 3v4" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
    <path d="M12 12v6M9 15h6" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
  </svg>
);
const Megaphone = ({ c = 'currentColor' }) => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M4 10v4l14 6V4L4 10z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
    <path d="M8 14v4" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
  </svg>
);
const Dollar = ({ c = 'currentColor' }) => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.8"/>
    <path d="M15 9a3 3 0 00-3-1.5c-1.7 0-3 1-3 2.3 0 1.3 1.2 1.9 3 2.2 1.8.3 3 .9 3 2.2 0 1.3-1.3 2.3-3 2.3a3 3 0 01-3-1.5M12 6v12" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
  </svg>
);
const Sparkles = ({ c = 'currentColor' }) => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6L12 3z" fill={c}/>
    <path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z" fill={c}/>
  </svg>
);
const Shield = ({ c = 'currentColor' }) => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6l8-3z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
    <path d="M9 12l2 2 4-4" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
const Copy = ({ c = 'currentColor' }) => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
    <rect x="8" y="8" width="13" height="13" rx="2.5" stroke={c} strokeWidth="1.8"/>
    <path d="M16 8V5a2 2 0 00-2-2H5a2 2 0 00-2 2v9a2 2 0 002 2h3" stroke={c} strokeWidth="1.8"/>
  </svg>
);
const Check = ({ c = 'currentColor' }) => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
    <path d="M5 12l5 5L20 7" stroke={c} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
const Chevron = ({ c = 'currentColor' }) => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
    <path d="M9 6l6 6-6 6" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

/* =========================================================
   PHONE CHROME
   ========================================================= */
function TopBar({ title, accent }) {
  return (
    <div style={{
      background: accent,
      height: 56,
      display: 'grid',
      gridTemplateColumns: '1fr auto 1fr',
      alignItems: 'center',
      padding: '0 16px',
      flexShrink: 0,
      position: 'relative',
      zIndex: 3,
    }}>
      <div />
      <div style={{
        color: '#fff', fontSize: 17, fontWeight: 600, letterSpacing: -0.2,
      }}>{title}</div>
      <div style={{ justifySelf: 'end' }}>
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: 'rgba(255,255,255,0.22)',
          color: '#fff', fontSize: 13, fontWeight: 600,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>M</div>
      </div>
    </div>
  );
}

function BottomNav({ active, onChange, accent }) {
  const items = [
    { key: 'sessions', Icon: CalendarPlus },
    { key: 'announce', Icon: Megaphone },
    { key: 'pay', Icon: Dollar },
    { key: 'more', Icon: Sparkles },
    { key: 'admin', Icon: Shield },
  ];
  return (
    <div style={{
      background: 'var(--color-bg-card)',
      borderTop: '1px solid var(--color-divider)',
      height: 64,
      display: 'grid',
      gridTemplateColumns: 'repeat(5, 1fr)',
      alignItems: 'center',
      justifyItems: 'center',
      flexShrink: 0,
      position: 'relative',
      zIndex: 3,
    }}>
      {items.map(({key, Icon}) => {
        const isActive = key === active;
        return (
          <button key={key} onClick={() => onChange(key)}
            style={{
              background: 'none', border: 0, padding: 0, cursor: 'pointer',
              color: isActive ? accent : 'var(--color-text-secondary)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              width: 44, height: 44,
            }}>
            <Icon c={isActive ? accent : '#888'} />
          </button>
        );
      })}
    </div>
  );
}

/* =========================================================
   CARDS — three variants
   ========================================================= */

// Variant A: HERO — full image + text block below (matches Training Sessions exactly)
function HeroCard({ item, showEyebrow, accent, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: 'var(--color-bg-card)',
      borderRadius: 'var(--radius-lg)',
      overflow: 'hidden',
      padding: 0,
      border: 0,
      cursor: 'pointer',
      textAlign: 'left',
      width: '100%',
      color: 'inherit',
      fontFamily: 'inherit',
      display: 'block',
      flexShrink: 0,
      transition: 'transform .15s ease',
    }}
    onMouseDown={e => e.currentTarget.style.transform = 'scale(0.992)'}
    onMouseUp={e => e.currentTarget.style.transform = ''}
    onMouseLeave={e => e.currentTarget.style.transform = ''}
    >
      <div style={{ width: '100%', height: 180 }}>
        <Art kind={item.art} accent={accent} />
      </div>
      <div style={{ padding: 16 }}>
        {showEyebrow && (
          <div style={{
            color: accent,
            fontSize: 11, fontWeight: 600,
            textTransform: 'uppercase',
            letterSpacing: '0.08em',
            marginBottom: 4,
          }}>{item.label}</div>
        )}
        <div style={{
          color: 'var(--color-text-primary)',
          fontSize: 14, fontWeight: 400,
          marginBottom: 2,
        }}>{item.title}</div>
        <div style={{
          color: 'var(--color-text-secondary)',
          fontSize: 13, fontWeight: 400,
        }}>{item.subtitle}</div>
      </div>
    </button>
  );
}

// Variant B: COMPACT — side image (96x96) + stacked text, a denser list feel
function CompactCard({ item, showEyebrow, accent, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: 'var(--color-bg-card)',
      borderRadius: 'var(--radius-lg)',
      overflow: 'hidden',
      padding: 0,
      border: 0,
      cursor: 'pointer',
      textAlign: 'left',
      width: '100%',
      color: 'inherit',
      fontFamily: 'inherit',
      display: 'flex',
      alignItems: 'stretch',
      minHeight: 96,
      flexShrink: 0,
    }}>
      <div style={{ width: 112, flexShrink: 0 }}>
        <Art kind={item.art} accent={accent} />
      </div>
      <div style={{
        padding: '14px 16px',
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        flex: 1, minWidth: 0,
      }}>
        {showEyebrow && (
          <div style={{
            color: accent,
            fontSize: 11, fontWeight: 600,
            textTransform: 'uppercase',
            letterSpacing: '0.08em',
            marginBottom: 4,
          }}>{item.label}</div>
        )}
        <div style={{
          color: 'var(--color-text-primary)',
          fontSize: 15, fontWeight: 500,
          marginBottom: 2,
        }}>{item.title}</div>
        <div style={{
          color: 'var(--color-text-secondary)',
          fontSize: 13, fontWeight: 400,
        }}>{item.subtitle}</div>
      </div>
      <div style={{
        padding: '0 16px', display: 'flex', alignItems: 'center',
        color: 'var(--color-text-secondary)',
      }}>
        <Chevron c="#666"/>
      </div>
    </button>
  );
}

// Variant C: MIXED — first item is hero, rest are compact
function MixedList({ items, showEyebrow, accent, onItemClick }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, flexShrink: 0 }}>
      <HeroCard item={items[0]} showEyebrow={showEyebrow} accent={accent} onClick={() => onItemClick(items[0])}/>
      {items.slice(1).map(it => (
        <CompactCard key={it.key} item={it} showEyebrow={showEyebrow} accent={accent} onClick={() => onItemClick(it)}/>
      ))}
    </div>
  );
}

/* =========================================================
   SHARE CARD — retained from original, restyled
   ========================================================= */
function ShareCard({ accent }) {
  const [copied, setCopied] = useState(false);
  const url = 'https://fatuwr.up.railway.app';
  const copy = () => {
    navigator.clipboard && navigator.clipboard.writeText(url);
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };
  return (
    <div style={{
      background: 'var(--color-bg-card)',
      borderRadius: 'var(--radius-lg)',
      padding: 16,
      flexShrink: 0,
    }}>
      <div style={{
        color: 'var(--color-text-secondary)',
        fontSize: 13, marginBottom: 8,
      }}>Share the app</div>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
      }}>
        <div style={{
          color: 'var(--color-text-primary)',
          fontSize: 14, fontFamily: 'ui-monospace, "SF Mono", Menlo, monospace',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          flex: 1, minWidth: 0,
        }}>{url}</div>
        <button onClick={copy} style={{
          background: 'none', border: 0, cursor: 'pointer',
          color: accent, fontSize: 15, fontWeight: 500,
          display: 'flex', alignItems: 'center', gap: 6,
          padding: 0, fontFamily: 'inherit',
        }}>
          {copied ? <Check c={accent}/> : <Copy c={accent}/>}
          {copied ? 'Copied' : 'Copy'}
        </button>
      </div>
    </div>
  );
}

/* =========================================================
   TWEAKS PANEL
   ========================================================= */
function TweaksPanel({ tweaks, setTweaks, visible, onClose }) {
  if (!visible) return null;
  const set = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent && window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };
  const group = {
    display: 'flex', flexDirection: 'column', gap: 6,
    paddingBottom: 12, marginBottom: 12,
    borderBottom: '1px solid rgba(255,255,255,0.08)',
  };
  const label = {
    fontSize: 11, fontWeight: 600, textTransform: 'uppercase',
    letterSpacing: '0.08em', color: 'rgba(255,255,255,0.55)',
  };
  const pill = (active) => ({
    padding: '6px 12px', fontSize: 13, fontWeight: 500,
    borderRadius: 9999, cursor: 'pointer', border: '1.5px solid',
    background: active ? '#2196F3' : 'transparent',
    borderColor: active ? '#2196F3' : 'rgba(255,255,255,0.35)',
    color: '#fff',
    fontFamily: 'inherit',
  });
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 100,
      width: 260,
      background: 'rgba(28,28,30,0.92)',
      backdropFilter: 'blur(20px)',
      WebkitBackdropFilter: 'blur(20px)',
      border: '1px solid rgba(255,255,255,0.12)',
      borderRadius: 16,
      padding: 16,
      color: '#fff',
      fontFamily: 'Inter, system-ui, sans-serif',
      boxShadow: '0 20px 50px rgba(0,0,0,0.5)',
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 14,
      }}>
        <div style={{ fontSize: 14, fontWeight: 600 }}>Tweaks</div>
        <button onClick={onClose} style={{
          background: 'none', border: 0, color: 'rgba(255,255,255,0.6)', cursor: 'pointer',
          fontSize: 18, lineHeight: 1, padding: 4,
        }}>×</button>
      </div>

      <div style={group}>
        <div style={label}>Card style</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {['hero', 'compact', 'mixed'].map(v => (
            <button key={v} onClick={() => set('variant', v)} style={pill(tweaks.variant === v)}>
              {v[0].toUpperCase() + v.slice(1)}
            </button>
          ))}
        </div>
      </div>

      <div style={group}>
        <div style={label}>Category eyebrow</div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={() => set('showEyebrow', true)} style={pill(tweaks.showEyebrow)}>Show</button>
          <button onClick={() => set('showEyebrow', false)} style={pill(!tweaks.showEyebrow)}>Hide</button>
        </div>
      </div>

      <div style={group}>
        <div style={label}>Share card</div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={() => set('showShareCard', true)} style={pill(tweaks.showShareCard)}>Show</button>
          <button onClick={() => set('showShareCard', false)} style={pill(!tweaks.showShareCard)}>Hide</button>
        </div>
      </div>

      <div style={{ ...group, borderBottom: 0, marginBottom: 0, paddingBottom: 0 }}>
        <div style={label}>Accent</div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {['#2196F3', '#3F7BE6', '#4DB6E6', '#EC6B4B'].map(c => (
            <button key={c} onClick={() => set('accent', c)} style={{
              width: 28, height: 28, borderRadius: '50%',
              background: c, cursor: 'pointer',
              border: tweaks.accent === c ? '2.5px solid #fff' : '2.5px solid transparent',
              boxShadow: tweaks.accent === c ? `0 0 0 1px ${c}` : 'none',
              padding: 0,
            }}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* =========================================================
   APP
   ========================================================= */
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tab, setTab] = useState('more');
  const [flash, setFlash] = useState(null);

  // Tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent && window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const onItemClick = (item) => {
    setFlash(item.title);
    setTimeout(() => setFlash(null), 1200);
  };

  const renderCards = () => {
    if (tweaks.variant === 'hero') {
      return ITEMS.map(it => (
        <HeroCard key={it.key} item={it} showEyebrow={tweaks.showEyebrow} accent={tweaks.accent} onClick={() => onItemClick(it)}/>
      ));
    }
    if (tweaks.variant === 'compact') {
      return ITEMS.map(it => (
        <CompactCard key={it.key} item={it} showEyebrow={tweaks.showEyebrow} accent={tweaks.accent} onClick={() => onItemClick(it)}/>
      ));
    }
    return <MixedList items={ITEMS} showEyebrow={tweaks.showEyebrow} accent={tweaks.accent} onItemClick={onItemClick}/>;
  };

  return (
    <div style={{
      minHeight: '100vh',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 20px',
      background: 'radial-gradient(circle at 30% 20%, #2a2a2a 0%, #0f0f0f 70%)',
    }}>
      {/* phone */}
      <div
        data-screen-label="More"
        style={{
          width: 390, height: 844,
          background: 'var(--color-bg-base)',
          borderRadius: 44,
          overflow: 'hidden',
          display: 'flex', flexDirection: 'column',
          boxShadow: '0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04)',
          position: 'relative',
        }}>
        <TopBar title="More" accent={tweaks.accent}/>

        <div className="phone-scroll" style={{
          flex: 1, overflow: 'auto',
          padding: '16px 16px 24px',
          display: 'flex', flexDirection: 'column', gap: 12,
          background: 'var(--color-bg-base)',
        }}>
          {tweaks.variant === 'mixed' ? (
            <MixedList items={ITEMS} showEyebrow={tweaks.showEyebrow} accent={tweaks.accent} onItemClick={onItemClick}/>
          ) : (
            renderCards()
          )}

          {tweaks.showShareCard && <div style={{ marginTop: 12 }}><ShareCard accent={tweaks.accent}/></div>}
        </div>

        <BottomNav active={tab} onChange={setTab} accent={tweaks.accent}/>

        {/* flash toast */}
        {flash && (
          <div style={{
            position: 'absolute',
            left: '50%', bottom: 88, transform: 'translateX(-50%)',
            background: 'rgba(42,42,42,0.96)',
            color: '#fff', fontSize: 13,
            padding: '10px 16px',
            borderRadius: 9999,
            border: '1px solid rgba(255,255,255,0.1)',
            pointerEvents: 'none',
            whiteSpace: 'nowrap',
          }}>Opened · {flash}</div>
        )}
      </div>

      <TweaksPanel
        tweaks={tweaks}
        setTweaks={setTweaks}
        visible={tweaksVisible}
        onClose={() => setTweaksVisible(false)}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
